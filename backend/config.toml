# eBay Market Intelligence — Application Configuration
# Edit this file to configure all non-secret settings.
# Secrets (API keys, DB password, auth token) live in .env — never commit .env

[app]
title         = "eBay Market Intelligence"
debug         = false
log_level     = "INFO"          # DEBUG | INFO | WARNING | ERROR
log_file      = "logs/app.log"  # path relative to project root
log_rotation  = "50 MB"         # rotate when file reaches this size
log_retention = "30 days"       # keep rotated logs for this long

[api]
host         = "0.0.0.0"
port         = 8000
cors_origins = ["http://localhost:5173", "http://localhost:3000"]

[auth]
# Set to true to require a Bearer token on ALL API routes.
# The token itself is read from the API_TOKEN env variable (never put it here).
enabled = false

[database]
host              = "localhost"
port              = 5432
name              = "ebay_market_intel"
pool_size         = 10
pool_max_overflow = 5

[ebay]
site_id                  = "EBAY-GB"   # EBAY-US | EBAY-GB | EBAY-DE | EBAY-AU | EBAY-CA | EBAY-FR
max_pages                = 10000       # maximum pages to fetch per Finding API poll (set high to get all results)
results_per_page         = 100         # items per page (eBay max is 100)
request_timeout_seconds  = 15
retry_attempts           = 3
retry_backoff_seconds    = 2.0         # base for exponential backoff

[scraper]
enabled                       = true
completed_days                = 90     # how many days back to scrape completed listings
user_agent                    = "Mozilla/5.0 (compatible; EbayIntelBot/1.0)"
delay_between_pages_seconds   = 1.5    # polite delay between scraper page requests

[scheduler]
default_interval_minutes = 60   # how often to poll each query (can be overridden per-query)
max_concurrent_polls     = 3    # maximum simultaneous eBay poll jobs
jitter_seconds           = 30   # random 0–N second jitter added to each scheduled fire time
